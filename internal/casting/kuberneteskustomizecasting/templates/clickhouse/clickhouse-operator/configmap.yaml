apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-operator-etc-files
  labels:
    app.kubernetes.io/name: clickhouse-operator
    app.kubernetes.io/instance: clickhouse-operator
    app.kubernetes.io/version: "0.25.3"
data:
  config.yaml: |-
    annotation:
      exclude:
      - argocd.argoproj.io/tracking-id
      include: []
    clickhouse:
      access:
        password: ""
        port: 8123
        rootCA: ""
        scheme: auto
        secret:
          name: "clickhouse-operator"
          namespace: "datastore"
        timeouts:
          connect: 1
          query: 4
        username: ""
      addons:
        rules:
        - spec:
            configuration:
              files: null
              profiles: null
              quotas: null
              settings: null
              users: null
          version: '*'
        - spec:
            configuration:
              files: null
              profiles: null
              quotas: null
              settings: null
              users:
                '{clickhouseOperatorUser}/access_management': 1
                '{clickhouseOperatorUser}/named_collection_control': 1
                '{clickhouseOperatorUser}/show_named_collections': 1
                '{clickhouseOperatorUser}/show_named_collections_secrets': 1
          version: '>= 23.3'
        - spec:
            configuration:
              files: null
              profiles:
                clickhouse_operator/format_display_secrets_in_show_and_select: 1
              quotas: null
              settings:
                display_secrets_in_show_and_select: 1
              users: null
          version: '>= 23.5'
      configuration:
        file:
          path:
            common: chi/config.d
            host: chi/conf.d
            user: chi/users.d
        network:
          hostRegexpTemplate: (chi-{chi}-[^.]+\d+-\d+|clickhouse\-{chi})\.{namespace}\.svc\.cluster\.local$
        user:
          default:
            networksIP:
            - ::1
            - 127.0.0.1
            password: default
            profile: default
            quota: default
      configurationRestartPolicy:
        rules:
        - rules:
          - settings/*: "yes"
          - settings/access_control_path: "no"
          - settings/dictionaries_config: "no"
          - settings/max_server_memory_*: "no"
          - settings/max_*_to_drop: "no"
          - settings/max_concurrent_queries: "no"
          - settings/models_config: "no"
          - settings/user_defined_executable_functions_config: "no"
          - settings/logger/*: "no"
          - settings/macros/*: "no"
          - settings/remote_servers/*: "no"
          - settings/user_directories/*: "no"
          - settings/display_secrets_in_show_and_select: "no"
          - zookeeper/*: "yes"
          - files/*.xml: "yes"
          - files/config.d/*.xml: "yes"
          - files/config.d/*dict*.xml: "no"
          - files/config.d/*no_restart*: "no"
          - profiles/default/background_*_pool_size: "yes"
          - profiles/default/max_*_for_server: "yes"
          version: '*'
        - rules:
          - settings/logger: "yes"
          version: 21.*
      metrics:
        timeouts:
          collect: 9
    keeper:
      configuration:
        file:
          path:
            common: chk/keeper_config.d
            host: chk/conf.d
            user: chk/users.d
    label:
      appendScope: "no"
      exclude: []
      include: []
    logger:
      alsologtostderr: "false"
      log_backtrace_at: ""
      logtostderr: "true"
      stderrthreshold: ""
      v: "1"
      vmodule: ""
    metrics:
      labels:
        exclude: []
    pod:
      terminationGracePeriod: 30
    reconcile:
      host:
        wait:
          exclude: true
          include: false
          queries: true
          replicas:
            all: false
            delay: 10
            new: true
      runtime:
        reconcileCHIsThreadsNumber: 10
        reconcileShardsMaxConcurrencyPercent: 50
        reconcileShardsThreadsNumber: 5
      statefulSet:
        create:
          onFailure: ignore
        update:
          onFailure: abort
          pollInterval: 5
          timeout: 300
    statefulSet:
      revisionHistoryLimit: 0
    status:
      fields:
        action: false
        actions: false
        error: false
        errors: false
    template:
      chi:
        path: chi/templates.d
        policy: ApplyOnNextReconcile
      chk:
        path: chk/templates.d
        policy: ApplyOnNextReconcile
    watch:
      namespaces:
        - ".*"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-operator-etc-templatesd-files
  labels:
    app.kubernetes.io/name: clickhouse-operator
    app.kubernetes.io/instance: clickhouse-operator
    app.kubernetes.io/version: "0.25.3"
data:
  001-templates.json.example: |
    {
      "apiVersion": "clickhouse.altinity.com/v1",
      "kind": "ClickHouseInstallationTemplate",
      "metadata": {
        "name": "01-default-volumeclaimtemplate"
      },
      "spec": {
        "templates": {
          "volumeClaimTemplates": [
            {
              "name": "chi-default-volume-claim-template",
              "spec": {
                "accessModes": [
                  "ReadWriteOnce"
                ],
                "resources": {
                  "requests": {
                    "storage": "2Gi"
                  }
                }
              }
            }
          ],
          "podTemplates": [
            {
              "name": "chi-default-oneperhost-pod-template",
              "distribution": "OnePerHost",
              "spec": {
                "containers" : [
                  {
                    "name": "clickhouse",
                    "image": "clickhouse/clickhouse-server:23.8",
                    "ports": [
                      {
                        "name": "http",
                        "containerPort": 8123
                      },
                      {
                        "name": "client",
                        "containerPort": 9000
                      },
                      {
                        "name": "interserver",
                        "containerPort": 9009
                      }
                    ]
                  }
                ]
              }
            }
          ]
        }
      }
    }
  default-pod-template.yaml.example: |
    apiVersion: "clickhouse.altinity.com/v1"
    kind: "ClickHouseInstallationTemplate"
    metadata:
      name: "default-oneperhost-pod-template"
    spec:
      templates:
        podTemplates:
          - name: default-oneperhost-pod-template
            distribution: "OnePerHost"
  default-storage-template.yaml.example: |
    apiVersion: "clickhouse.altinity.com/v1"
    kind: "ClickHouseInstallationTemplate"
    metadata:
      name: "default-storage-template-2Gi"
    spec:
      templates:
        volumeClaimTemplates:
          - name: default-storage-template-2Gi
            spec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 2Gi
  readme: Templates in this folder are packaged with an operator and available via 'useTemplate'
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-operator-etc-usersd-files
  labels:
    app.kubernetes.io/name: clickhouse-operator
    app.kubernetes.io/instance: clickhouse-operator
    app.kubernetes.io/version: "0.25.3"
data:
  01-clickhouse-user.xml: |
    <yandex>
        <users>
            <clickhouse_operator>
                <networks>
                    <ip>127.0.0.1</ip>
                </networks>
                <password_sha256_hex></password_sha256_hex>
                <profile>clickhouse_operator</profile>
                <quota>default</quota>
            </clickhouse_operator>
        </users>
        <profiles>
            <clickhouse_operator>
                <log_queries>0</log_queries>
                <skip_unavailable_shards>1</skip_unavailable_shards>
                <http_connection_timeout>10</http_connection_timeout>
            </clickhouse_operator>
        </profiles>
    </yandex>
  02-clickhouse-default-profile.xml: |
    <yandex>
      <profiles>
        <default>
          <log_queries>1</log_queries>
          <connect_timeout_with_failover_ms>1000</connect_timeout_with_failover_ms>
          <distributed_aggregation_memory_efficient>1</distributed_aggregation_memory_efficient>
          <parallel_view_processing>1</parallel_view_processing>
        </default>
      </profiles>
    </yandex>
  03-database-ordinary.xml: |
    <yandex>
        <profiles>
            <default>
                <default_database_engine>Ordinary</default_database_engine>
            </default>
        </profiles>
    </yandex>
---
