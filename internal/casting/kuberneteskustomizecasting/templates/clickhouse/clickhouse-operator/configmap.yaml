apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-operator-keeper-etc-configd-files
  labels:
    app.kubernetes.io/name: clickhouse-operator
    app.kubernetes.io/instance: clickhouse-operator
    app.kubernetes.io/version: "0.25.3"
data:
  01-keeper-01-default-config.xml: |
    <!-- IMPORTANT -->
    <!-- This file is auto-generated -->
    <!-- Do not edit this file - all changes would be lost -->
    <!-- Edit appropriate template in the following folder: -->
    <!-- deploy/builder/templates-config -->
    <!-- IMPORTANT -->
    <clickhouse>
        <keeper_server>
            <coordination_settings>
                <min_session_timeout_ms>10000</min_session_timeout_ms>
                <operation_timeout_ms>10000</operation_timeout_ms>
                <raft_logs_level>information</raft_logs_level>
                <session_timeout_ms>100000</session_timeout_ms>
            </coordination_settings>
            <hostname_checks_enabled>true</hostname_checks_enabled>
            <log_storage_path>/var/lib/clickhouse-keeper/coordination/logs</log_storage_path>
            <snapshot_storage_path>/var/lib/clickhouse-keeper/coordination/snapshots</snapshot_storage_path>
            <storage_path>/var/lib/clickhouse-keeper</storage_path>
            <tcp_port>2181</tcp_port>
        </keeper_server>
        <listen_host>::</listen_host>
        <listen_host>0.0.0.0</listen_host>
        <listen_try>1</listen_try>
        <logger>
            <console>1</console>
            <level>information</level>
        </logger>
        <max_connections>4096</max_connections>
    </clickhouse>
  01-keeper-02-readiness.xml: |
    <!-- IMPORTANT -->
    <!-- This file is auto-generated -->
    <!-- Do not edit this file - all changes would be lost -->
    <!-- Edit appropriate template in the following folder: -->
    <!-- deploy/builder/templates-config -->
    <!-- IMPORTANT -->
    <clickhouse>
        <keeper_server>
            <http_control>
                <port>9182</port>
                <readiness>
                    <endpoint>/ready</endpoint>
                </readiness>
            </http_control>
        </keeper_server>
    </clickhouse>
  01-keeper-03-enable-reconfig.xml: |-
    <!-- IMPORTANT -->
    <!-- This file is auto-generated -->
    <!-- Do not edit this file - all changes would be lost -->
    <!-- Edit appropriate template in the following folder: -->
    <!-- deploy/builder/templates-config -->
    <!-- IMPORTANT -->
    <clickhouse>
        <keeper_server>
            <enable_reconfiguration>false</enable_reconfiguration>
        </keeper_server>
    </clickhouse>
