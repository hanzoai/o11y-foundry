apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app.kubernetes.io/component: signoz
    app.kubernetes.io/instance: signoz
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: signoz-signoz
  name: signoz-signoz
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: signoz
      app.kubernetes.io/instance: signoz
      app.kubernetes.io/name: signoz-signoz
  serviceName: signoz-signoz
  template:
    metadata:
      labels:
        app.kubernetes.io/component: signoz
        app.kubernetes.io/instance: signoz
        app.kubernetes.io/name: signoz-signoz
    spec:
      containers:
      - env:
        - name: SIGNOZ_SQLSTORE_POSTGRES_DSN
          value: postgres://signoz:signoz@signoz-metastore:5432/signoz?sslmode=disable
        - name: SIGNOZ_SQLSTORE_PROVIDER
          value: postgres
        - name: SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN
          value: tcp://signoz-clickhouse:9000
        - name: SIGNOZ_TELEMETRYSTORE_PROVIDER
          value: clickhouse
        image: signoz/signoz:latest
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 6
          httpGet:
            path: /api/v1/health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 5
        name: signoz
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        - containerPort: 4320
          name: opamp
          protocol: TCP
        readinessProbe:
          failureThreshold: 6
          httpGet:
            path: /api/v1/health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 200Mi
      serviceAccountName: signoz-signoz
