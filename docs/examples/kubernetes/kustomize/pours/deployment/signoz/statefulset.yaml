apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app.kubernetes.io/component: signoz
    app.kubernetes.io/instance: signoz
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: signoz-signoz
  name: signoz-signoz
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: signoz
      app.kubernetes.io/instance: signoz
      app.kubernetes.io/name: signoz-signoz
  serviceName: signoz-signoz
  template:
    metadata:
      labels:
        app.kubernetes.io/component: signoz
        app.kubernetes.io/instance: signoz
        app.kubernetes.io/name: signoz-signoz
    spec:
      containers:
      - env:
        - name: CLICKHOUSE_USER
          value: admin
        - name: CLICKHOUSE_PASSWORD
          value: 27ff0399-0d3a-4bd8-919d-17c2181e6fb9
        - name: ClickHouseUrl
          value: tcp://signoz-clickhouse:9000/?username=admin&password=27ff0399-0d3a-4bd8-919d-17c2181e6fb9
        - name: SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN
          value: tcp://signoz-clickhouse:9000
        - name: SIGNOZ_SQLSTORE_SQLITE_PATH
          value: /var/lib/signoz/signoz.db
        - name: DASHBOARDS_PATH
          value: /root/config/dashboards
        - name: ENABLE_QB_V5
          value: "true"
        - name: GODEBUG
          value: netdns=go
        - name: STORAGE
          value: clickhouse
        - name: TELEMETRY_ENABLED
          value: "true"
        - name: DEPLOYMENT_TYPE
          value: kubernetes-kustomize
        image: signoz/signoz:latest
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 6
          httpGet:
            path: /api/v1/health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 5
        name: signoz
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        - containerPort: 4320
          name: opamp
          protocol: TCP
        readinessProbe:
          failureThreshold: 6
          httpGet:
            path: /api/v1/health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 200Mi
        volumeMounts:
        - mountPath: /var/lib/signoz/
          name: store
      serviceAccountName: signoz-signoz
  volumeClaimTemplates:
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: store
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi
