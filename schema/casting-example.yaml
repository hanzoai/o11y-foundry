schemaVersion: v1
platform: docker
type: highly-available
components:
  - name: signoz
    replicas: 1
    version: "0.39.2"
    env:
      - key: SIGNOZ_HOST
        value: "signoz"
  - name: clickhouse
    replicas: 1
    version: "24.8"
    env:
      - key: CLICKHOUSE_HOST
        value: clickhouse
      - key: CLICKHOUSE_PORT
        value: "9000"
  - name: zookeeper
    replicas: 1
    version: "3.7"
    env:
      - key: ZOOKEEPER_HOST
        value: zookeeper-1
      - key: ZOOKEEPER_PORT
        value: "2181"
  - name: signoz-collector
    replicas: 1
    version: "0.39.2"
requirements:
  - docker
  - docker-compose
